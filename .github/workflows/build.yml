name: rhythm-convert
on:
  push:
    paths:
      - 'original.wav'
      - 'mad.wav'
      - 'original.midi'
  workflow_dispatch:
permissions:
  contents: write
jobs:
  convert:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y libsndfile1
          pip install librosa soundfile pyyaml pretty-midi numpy
      - name: Run convert.py
        run: python convert.py
      - name: Commit converted files
        if: success()
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add mad_converted.wav analysis.json
          git commit -m "rhythm-convert: mad.wav を original.wav のメロディライン・音階・長さに完全一致変換" || exit 0
          git push
