name: Rhythm Convert OtoMAD

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - run: sudo apt-get update && sudo apt-get install -y ffmpeg libsndfile1

      - run: pip install librosa numpy soundfile pretty_midi scipy

      - run: python convert.py

      - uses: actions/upload-artifact@v3
        with:
          name: mad-output
          path: mad_output.wav
